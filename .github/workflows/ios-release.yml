name: iOS App Store Release

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: Submit to App Review after upload
        type: boolean
        default: true

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install tools
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          bundle install

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          SIM_NAME="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone .* Pro/ {gsub(/^ +| +$/, "", $1); print $1; exit}')"
          if [ -z "$SIM_NAME" ]; then SIM_NAME="iPhone 16 Pro"; fi
          xcodebuild test -scheme MagnetRelay -destination "platform=iOS Simulator,name=${SIM_NAME}"

      - name: Validate release inputs
        run: bundle exec fastlane ios doctor

      - name: Build upload and submit
        run: bundle exec fastlane ios release submit_for_review:${{ inputs.submit_for_review }}
