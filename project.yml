name: MagnetRelay
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_TEAM: 97D3P28B69
targets:
  MagnetRelay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MagnetRelay
    info:
      path: MagnetRelay/Info.plist
      properties:
        CFBundleDisplayName: Flux Relay
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: FluxRelaySplashLogo
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ismailharmanda.magnetrelay
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_TESTABILITY: YES
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: GameplayKit.framework
      - sdk: AVFoundation.framework
  MagnetRelayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MagnetRelayTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ismailharmanda.magnetrelay.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MagnetRelay
  MagnetRelayLevelPlanner:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MagnetRelay/Game/GameModels.swift
      - path: MagnetRelay/Game/RuleEngine.swift
      - path: MagnetRelay/Game/LevelSolver.swift
      - path: MagnetRelay/Game/LevelGenerator.swift
      - path: MagnetRelay/Data/LevelCatalog.swift
      - path: MagnetRelay/Data/GeneratedLevelCatalog.swift
      - path: MagnetRelayLevelPlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ismailharmanda.magnetrelay.levelplanner
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MagnetRelay:
    build:
      targets:
        MagnetRelay: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - MagnetRelayTests
  MagnetRelayLevelPlanner:
    build:
      targets:
        MagnetRelayLevelPlanner: all
    run:
      config: Debug
